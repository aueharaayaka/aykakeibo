<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="cache-version" content="1772774192">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計簿">
<link rel="apple-touch-icon" href="icon.png?v=1772763765">
<title>家計簿</title>
<style>
  @font-face { font-family: 'LINESeedJP'; src: url('fonts/LINESeedJP-Thin.ttf') format('truetype'); font-weight: 100; font-style: normal; }
  @font-face { font-family: 'LINESeedJP'; src: url('fonts/LINESeedJP-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'LINESeedJP'; src: url('fonts/LINESeedJP-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'LINESeedJP'; src: url('fonts/LINESeedJP-ExtraBold.ttf') format('truetype'); font-weight: 900; font-style: normal; }
</style>
<style>
  :root {
    --pink-bg: #fde8ef;
    --pink-light: #fdf0f4;
    --pink-main: #f0518a;
    --pink-dark: #e8256e;
    --pink-border: #f9c5d8;
    --pink-mid: #f7a8c4;
    --text-dark: #d41b6a;
    --text-body: #333;
    --white: #ffffff;
    --shadow: 0 2px 8px rgba(240,81,138,0.12);
    --radius: 8px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overflow: hidden; width: 100%; height: 100%; }
  body {
    font-family: 'LINESeedJP', sans-serif;
    background: var(--pink-bg);
    color: var(--text-body);
    height: 100%;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    padding-top: env(safe-area-inset-top, 0px);
    overflow: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; padding: env(safe-area-inset-top, 14px) 14px 90px; height: 100vh; height: 100dvh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; box-sizing: border-box; }
  .screen.active { display: block; }
  #screen-settings.active {
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #screen-savings.active {
    display: flex; flex-direction: column;
    overflow: hidden;
    padding-bottom: 0;
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white); border-top: 1px solid var(--pink-border);
    display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px; background: none; border: none; cursor: pointer;
    font-family: 'LINESeedJP', sans-serif; font-size: 10px;
    color: var(--pink-mid); transition: color 0.2s;
    gap: 3px;
  }
  .nav-btn.active { color: var(--pink-main); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-weight: 500; }

  /* ===== HEADER ===== */
  .month-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; width: 100%;
  }
  .month-nav-btn {
    width: 34px; height: 34px; flex-shrink: 0;
    background: none; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--pink-main); transition: all 0.2s;
  }
  .month-nav-btn svg { width: 24px; height: 24px; display: block; }
  .month-nav-btn:active { transform: scale(0.92); opacity: 0.6; }
  .month-title { text-align: center; flex: 1; }
  .month-title .month-num {
    font-size: 26px; font-weight: 700; color: var(--pink-main); letter-spacing: -1px;
  }
  .month-title .month-en {
    display: none;
  }

  /* ===== CARDS ===== */
  .field-group { margin-bottom: 8px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
  .field-row { display: flex; align-items: center; gap: 0; width: 100%; }
  .field-input-wrap {
    flex: 1; min-width: 0; position: relative;
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; align-items: center;
  }
  .field-input {
    flex: 1; min-width: 0; background: transparent; border: none; border-radius: var(--radius);
    padding: 9px 40px 9px 16px; font-size: 17px; font-weight: 700; font-family: 'LINESeedJP', sans-serif;
    text-align: right; color: var(--text-dark);
    transition: box-shadow 0.2s; width: 100%;
  }
  .field-input:focus { outline: none; }
  .field-input-wrap:focus-within { outline: 2px solid var(--pink-main); border-radius: var(--radius); }
  .field-input.readonly { color: var(--pink-main); pointer-events: none; }
  .field-unit-inside {
    position: absolute; right: 12px; font-size: 13px; font-weight: 700;
    color: var(--text-dark); pointer-events: none; flex-shrink: 0;
  }
  .field-unit { display: none; }

  /* ===== MONTH SLIDE ANIMATION ===== */
  @keyframes slideInFromRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInFromLeft  { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
  .slide-in-right { animation: slideInFromRight 0.45s ease; }
  .slide-in-left  { animation: slideInFromLeft  0.45s ease; }

  /* ===== SECTION TITLE ===== */
  .section-title {
    text-align: center; font-size: 16px; font-weight: 700;
    color: var(--pink-main); margin: 10px 0 8px;
  }

  /* ===== ENTRY FORM ===== */
  .entry-form {
    display: flex; align-items: center; gap: 4px; margin-bottom: 12px;
    width: 100%; box-sizing: border-box;
  }
  .select-wrap {
    position: relative; flex: 0 0 76px; min-width: 0;
  }
  .select-wrap select {
    width: 100%; padding: 9px 22px 9px 8px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--pink-border); background: var(--white);
    font-family: 'LINESeedJP', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text-body); -webkit-appearance: none; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .select-wrap::after { display: none; }
  .select-wrap .select-arrow {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    pointer-events: none; display: flex; align-items: center;
  }
  .text-input {
    flex: 1; min-width: 0; padding: 9px 8px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--pink-border); background: var(--white);
    font-family: 'LINESeedJP', sans-serif; font-size: 16px; color: var(--text-body);
    box-shadow: var(--shadow);
  }
  .text-input:focus { outline: 2px solid var(--pink-main); border-color: transparent; }
  .amount-input {
    flex: 0 0 120px; min-width: 0; padding: 9px 8px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--pink-border); background: var(--white);
    font-family: 'LINESeedJP', sans-serif; font-size: 16px; color: var(--text-body);
    text-align: left; box-shadow: var(--shadow);
  }
  .amount-input:focus { outline: 2px solid var(--pink-main); border-color: transparent; }
  .register-btn {
    flex: 0 0 auto; padding: 9px 12px; border-radius: 20px; background: var(--pink-main);
    color: white; font-family: 'LINESeedJP', sans-serif; font-size: 12px; font-weight: 700;
    border: none; cursor: pointer; white-space: nowrap; transition: all 0.2s;
    box-shadow: 0 3px 10px rgba(240,81,138,0.35);
  }
  .register-btn:active { transform: scale(0.95); }

  /* ===== TABLE ===== */
  .expense-table {
    background: var(--white); border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); margin-bottom: 12px;
  }
  .expense-table.scrollable {
    max-height: 180px; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .expense-table.setting-list {
    max-height: none;
  }
  .expense-row {
    display: flex; align-items: center; padding: 6px 12px;
    border-bottom: 1px solid var(--pink-bg); gap: 6px;
    animation: slideIn 0.25s ease;
  }
  .expense-row:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .row-date { font-size: 12px; color: #999; min-width: 28px; flex-shrink: 0; }
  .row-tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .row-item { flex: 1; font-size: 13px; color: var(--text-body); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .row-amount { font-size: 13px; font-weight: 700; color: var(--text-body); min-width: 52px; text-align: right; flex-shrink: 0; }
  .row-del { width: 22px; height: 22px; border-radius: 50%; border: none; background: #ffe0ec; color: var(--pink-main); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .row-del:active { background: var(--pink-main); color: white; }
  .row-edit { width: 22px; height: 22px; border-radius: 50%; border: none; background: #e8f0ff; color: #5a7ad4; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .row-edit:active { background: #5a7ad4; color: white; }
  .row-copy { width: 22px; height: 22px; border-radius: 50%; border: none; background: #e8ffef; color: #3a9e6a; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .row-copy:active { background: #3a9e6a; color: white; }

  /* ===== TOTAL BAR ===== */
  .total-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--white); border-radius: var(--radius);
    padding: 8px 16px; box-shadow: var(--shadow);
  }
  .total-label { font-size: 14px; font-weight: 700; color: var(--text-dark); }
  .total-filter-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 12px; border-radius: 20px;
    background: var(--pink-bg); border: 2px solid var(--pink-border);
    font-family: 'LINESeedJP', sans-serif; font-size: 12px; font-weight: 700;
    color: var(--text-dark); cursor: pointer; transition: all 0.2s;
  }
  .total-amount { flex: 1; text-align: right; font-size: 17px; font-weight: 700; color: var(--pink-main); }
  .total-unit { font-size: 14px; font-weight: 700; color: var(--text-dark); }

  /* ===== CATEGORY TAGS ===== */
  .tag-sonohe  { background: #f9d0de; color: #d4537a; }
  .tag-shokuhi { background: #fde8b0; color: #c97d00; }
  .tag-gaishoku { background: #d4f0e8; color: #3a9e7a; }
  .tag-kotsu   { background: #cce8ff; color: #3a7ec9; }
  .tag-chokin  { background: #f0e0ff; color: #8a5ad4; }
  .tag-jo1     { background: #dde8ff; color: #5a7ad4; }
    .tag-sonota  { background: #f9d0de; color: #d4537a; }
  .tag-chokin-use { background: #ede0ff; color: #7a3ad4; border: 1.5px solid #c9a0f0; }
  .tag-jo1-use    { background: #ccd8ff; color: #3a50d4; border: 1.5px solid #99b0f0; }

  /* ===== VACATION ===== */
  .vacation-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    background: var(--white); border-radius: var(--radius-sm);
    padding: 8px 10px; box-shadow: var(--shadow); cursor: pointer;
  }
  .vacation-row:active { background: var(--pink-bg); }
  .vacation-sep { font-size: 12px; color: #aaa; flex-shrink: 0; }
  .vacation-label { flex:1; font-size: 13px; color: var(--text-body); }

  /* カスタムカレンダーピッカー */
  .vcal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:300; align-items:flex-end; justify-content:center; }
  .vcal-overlay.show { display:flex; }
  .vcal-sheet { background:white; border-radius:20px 20px 0 0; padding:20px 16px 40px; width:100%; max-width:430px; }
  .vcal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .vcal-month-nav { background:none; border:none; font-size:20px; color:var(--pink-main); cursor:pointer; padding:4px 10px; }
  .vcal-month-label { font-size:15px; font-weight:700; color:var(--text-dark); }
  .vcal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .vcal-dow { text-align:center; font-size:11px; font-weight:700; color:#aaa; padding:2px 0; }
  .vcal-day { text-align:center; font-size:13px; padding:7px 2px; border-radius:8px; cursor:pointer; color:var(--text-body); position:relative; }
  .vcal-day.empty { cursor:default; }
  .vcal-day.today { font-weight:700; color:var(--pink-main); }
  .vcal-day.in-range { background:var(--pink-bg); border-radius:0; }
  .vcal-day.range-start, .vcal-day.range-end { background:var(--pink-main); color:white; border-radius:8px; font-weight:700; }
  .vcal-day.range-start { border-radius:8px 0 0 8px; }
  .vcal-day.range-end { border-radius:0 8px 8px 0; }
  .vcal-day.range-start.range-end { border-radius:8px; }
  .vcal-day.disabled { color:#ddd; cursor:default; }
  .vcal-hint { font-size:11px; color:#aaa; text-align:center; margin:10px 0 4px; }
  .vcal-month-label { font-size:15px; font-weight:700; color:var(--text-dark); cursor:pointer; padding:4px 8px; border-radius:8px; }
  .vcal-month-label:active { background:var(--pink-bg); }
  .vcal-picker-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:4px 0 8px; }
  .vcal-picker-item { text-align:center; padding:10px 4px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; color:var(--text-body); }
  .vcal-picker-item:active { background:var(--pink-bg); }
  .vcal-picker-item.selected { background:var(--pink-main); color:white; }
  .vcal-picker-back { font-size:12px; color:var(--pink-main); font-weight:700; cursor:pointer; margin-bottom:8px; display:inline-block; }
  @keyframes vcalSlideRight { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
  @keyframes vcalSlideLeft  { from { opacity:0; transform:translateX(30px);  } to { opacity:1; transform:translateX(0); } }
  .vcal-slide-right { animation: vcalSlideRight 0.3s ease; }
  .vcal-slide-left  { animation: vcalSlideLeft  0.3s ease; }
  .vcal-actions { display:flex; gap:8px; margin-top:14px; }
  .vcal-cancel { flex:1; padding:10px; border-radius:20px; border:2px solid var(--pink-border); background:white; font-family:'LINESeedJP',sans-serif; font-size:13px; font-weight:700; color:var(--text-dark); cursor:pointer; }
  .vcal-save { flex:2; padding:10px; border-radius:20px; border:none; background:var(--pink-main); font-family:'LINESeedJP',sans-serif; font-size:13px; font-weight:700; color:white; cursor:pointer; }

  /* ===== SETTINGS SCREEN ===== */
  .settings-title {
    font-size: 24px; font-weight: 700; color: var(--pink-main); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .settings-section { margin-bottom: 20px; }
  .settings-label { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }

  /* ===== SAVINGS SCREEN ===== */
  .savings-title {
    font-size: 24px; font-weight: 700; color: var(--pink-main); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .savings-columns { display: flex; gap: 12px; margin-top: 16px; flex: 1; min-height: 0; overflow: hidden; }
  .savings-col { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .savings-col-title { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; flex-shrink: 0; }
  .savings-table { background: var(--white); border-radius: var(--radius); overflow-y: auto; flex: 1; min-height: 0; -webkit-overflow-scrolling: touch; box-shadow: var(--shadow); padding-bottom: env(safe-area-inset-bottom, 0px); }
  .savings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-bottom: 1px solid var(--pink-bg);
    font-size: 12px; font-weight: 500;
  }
  .savings-row:last-child { border-bottom: none; }
  .savings-row .s-month { color: #999; }
  .savings-row .s-amount { font-weight: 700; color: var(--text-dark); }
  .savings-row.current-month { background: #fff0f5; }
  .savings-row.current-month .s-amount { color: var(--pink-main); }
  .savings-year-header { background: var(--pink-bg); padding: 5px 10px; }
  .savings-year-row { background: var(--pink-border); border-bottom: 2px solid var(--pink-main); }
  .savings-row .s-year-label { font-size: 13px; font-weight: 700; color: var(--pink-main) !important; }

  /* ===== DROPDOWN OVERLAY ===== */
  .dropdown-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3); z-index: 200; display: none;
    align-items: flex-end; justify-content: center;
  }
  .dropdown-overlay.show { display: flex; }
  .dropdown-sheet {
    background: var(--white); width: 100%; max-width: 430px;
    border-radius: 20px 20px 0 0; padding: 20px 16px 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .dropdown-sheet h3 { font-size: 16px; font-weight: 700; color: var(--pink-main); margin-bottom: 14px; }
  .edit-form { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .edit-form-row { display: flex; gap: 8px; align-items: center; }
  .edit-select { flex: 1; padding: 10px 12px; border-radius: 8px; border: 2px solid var(--pink-border); background: var(--white); font-family: 'LINESeedJP', sans-serif; font-size: 16px; -webkit-appearance: none; }
  .edit-text { flex: 1; padding: 10px 12px; border-radius: 8px; border: 2px solid var(--pink-border); background: var(--white); font-family: 'LINESeedJP', sans-serif; font-size: 16px; }
  .edit-amount { flex: 1; padding: 10px 12px; border-radius: 8px; border: 2px solid var(--pink-border); background: var(--white); font-family: 'LINESeedJP', sans-serif; font-size: 16px; text-align: right; }
  .edit-save-btn { width: 100%; padding: 12px; border-radius: 20px; background: var(--pink-main); color: white; font-family: 'LINESeedJP', sans-serif; font-size: 14px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 3px 10px rgba(240,81,138,0.35); }
  .filter-options-grid {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0;
  }
  .filter-option {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 20px;
    cursor: pointer; font-size: 13px; font-weight: 700;
    background: var(--pink-bg); color: var(--text-body);
    border: 2px solid transparent; transition: all 0.15s;
  }
  .filter-option.selected {
    background: var(--pink-main); color: white;
    border-color: var(--pink-main);
  }
  .filter-option .check { font-size: 12px; }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap { margin: 10px 0 16px; }
  .progress-label { font-size: 11px; color: #999; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .progress-bar { height: 8px; background: var(--pink-border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink-main), #ff85b3); border-radius: 4px; transition: width 0.6s ease; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--pink-main); color: white; padding: 10px 22px;
    border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 999;
    box-shadow: 0 4px 16px rgba(240,81,138,0.4); transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center; padding: 30px 0; color: var(--pink-mid);
    font-size: 13px; font-weight: 500;
  }

  /* ===== HEADER ICONS ===== */
  .header-icons { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .header-icon-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; cursor: pointer; color: var(--pink-main);
    font-family: 'LINESeedJP', sans-serif; font-size: 9px; font-weight: 700;
    transition: opacity 0.2s;
  }
  .header-icon-btn:active { opacity: 0.7; }
  .header-icon-btn svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<!-- TOP SCREEN -->
<div id="screen-top" class="screen active">
  <div class="month-header">
    <button class="month-nav-btn" onclick="changeMonth(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f0518a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="month-title" style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button onclick="openMonthJumpPicker()" style="display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:8px;font-family:'LINESeedJP',sans-serif;" id="month-jump-btn">
        <span class="month-num" id="month-num">3月</span>

]);
// ===== STATE =====
const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const MONTHS_EN = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

let state = {
  currentYear: 2026,
  currentMonth: 3,
  totalFilter: '全体',
  data: {}, // "YYYY-MM" => { income, expenses:[], overrides:{defId:{deleted,category,item,amount}} }
  settings: {
    dailyFood: 0,
    parking: 0,
    goal: 0,
    defaults: [], // [{defId, category, item, amount}]
    vacations: [] // [{from: 'YYYY-MM-DD', to: 'YYYY-MM-DD'}]
  }
};

// 編集中の対象
let editTarget = null; // {type:'expense'|'default', index, defId}

// ===== STORAGE =====
function saveData() {
  try { localStorage.setItem('kakeibo_state', JSON.stringify(state)); } catch(e) {}
}
function loadData() {
  try {
    const s = localStorage.getItem('kakeibo_state');
    if (s) {
      const parsed = JSON.parse(s);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
}

// ===== INIT =====
loadData();
// 既存データにdefIdがない場合は補完
(state.settings.defaults || []).forEach((e, i) => {
  if (!e.defId) e.defId = 'def_legacy_' + i;
});
const today = new Date();
// 常に今月を開く
state.currentYear = today.getFullYear();
state.currentMonth = today.getMonth() + 1;
// 範囲外の場合はクランプ
if (state.currentYear < 2026 || (state.currentYear === 2026 && state.currentMonth < 3)) {
  state.currentYear = 2026; state.currentMonth = 3;
}
// 上限なし（2026年3月以降であれば何年でも利用可能）
renderAll();

// ===== MONTH KEY =====
function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function getCurrentKey() { return monthKey(state.currentYear, state.currentMonth); }
function getCurrentData() {
  const k = getCurrentKey();
  if (!state.data[k]) state.data[k] = { income: 0, expenses: [], overrides: {} };
  if (!state.data[k].overrides) state.data[k].overrides = {};
  return state.data[k];
}

// ===== デフォルト支出の実効値を取得（月ごとのoverride込み）=====
function getEffectiveDefault(defEntry, overrides) {
  const ov = overrides[defEntry.defId];
  if (!ov) return { ...defEntry };
  if (ov.deleted) return null;
  return { ...defEntry, ...ov };
}

// ===== 全支出（デフォルト＋月別）を取得 =====
function getAllExpenses() {
  const d = getCurrentData();
  const overrides = d.overrides || {};
  const effectiveDefaults = (state.settings.defaults || [])
    .map(e => getEffectiveDefault(e, overrides))
    .filter(Boolean)
    .map(e => ({ ...e, isDefault: true }));
  return [...effectiveDefaults, ...(d.expenses || [])];
}

// ===== MONTH NAVIGATION =====
function changeMonth(delta) {
  let m = state.currentMonth + delta;
  let y = state.currentYear;
  if (m > 12) { m = 1; y++; }
  if (m < 1)  { m = 12; y--; }
  if (y < 2026 || (y === 2026 && m < 3)) return;
  state.currentYear = y;
  state.currentMonth = m;
  saveData();
  renderAll();
  // アニメーション：次月は右から、前月は左から
  const screen = document.getElementById('screen-top');
  const cls = delta > 0 ? 'slide-in-right' : 'slide-in-left';
  screen.classList.remove('slide-in-right', 'slide-in-left');
  void screen.offsetWidth; // reflow
  screen.classList.add(cls);
}

// ===== WEEKDAY COUNT =====
function isVacationDay(dateStr) {
  const vacations = state.settings.vacations || [];
  return vacations.some(v => v.from <= dateStr && dateStr <= v.to);
}

function countWeekdays(year, month) {
  const days = new Date(year, month, 0).getDate();
  let count = 0;
  for (let d = 1; d <= days; d++) {
    const dow = new Date(year, month - 1, d).getDay();
    if (dow === 0 || dow === 6) continue; // 土日除外
    const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (JAPAN_HOLIDAYS.has(key)) continue; // 祝日除外
    if (isVacationDay(key)) continue; // 休業日除外
    count++;
  }
  return count;
}

// ===== RECALC =====
function recalc() {
  const d = getCurrentData();
  const incomeVal = parseFloat((document.getElementById('income-input').value || '').replace(/,/g, '')) || 0;
  d.income = incomeVal;
  saveData();

  const allExpenses = getAllExpenses();
  // 貯金使用・JO1使用は現金支出でないので所持金・残高から除外
  const cashExpenses = allExpenses.filter(e => e.category !== '貯金使用' && e.category !== 'JO1使用');
  const totalExpenses = cashExpenses.reduce((s, e) => s + e.amount, 0);
  const holdings = incomeVal - totalExpenses;

  const weekdays = countWeekdays(state.currentYear, state.currentMonth);
  const dailyFood = parseFloat(document.getElementById('daily-food-input').value) || 0;
  const parking = parseFloat(document.getElementById('parking-input').value) || 0;
  const nonFoodExpenses = cashExpenses.filter(e => e.category !== '食費').reduce((s, e) => s + e.amount, 0);
  const balance = incomeVal - (nonFoodExpenses + dailyFood * weekdays + parking * weekdays);

  document.getElementById('holdings-display').value = holdings.toLocaleString();
  document.getElementById('balance-display').value = balance.toLocaleString();
  renderTotalBar();
}

// ===== RENDER ALL =====
function renderAll() {
  renderMonthHeader();
  const d = getCurrentData();
  document.getElementById('income-input').value = d.income ? Number(d.income).toLocaleString() : '';
  document.getElementById('daily-food-input').value = state.settings.dailyFood || '';
  document.getElementById('parking-input').value = state.settings.parking || '';
  document.getElementById('savings-goal').value = state.settings.goal ? Number(state.settings.goal).toLocaleString() : '';
  recalc();
  renderExpenseList();
  renderDefaultList();
  renderDefaultTotal();
  renderVacationList();
  renderSavings();
}

  const btn = document.getElementById('back-to-today-btn');
  if (btn) btn.style.display = isToday ? 'none' : 'inline-block';
}

function goToToday() {

  state.currentYear = now.getFullYear();
  state.currentMonth = now.getMonth() + 1;
  saveData();
  renderAll();

// ===== TAG CLASS =====
function tagClass(cat) {
  const map = { '食費':'tag-shokuhi','外食':'tag-gaishoku','交通費':'tag-kotsu','貯金':'tag-chokin','JO1':'tag-jo1','その他':'tag-sonota','貯金使用':'tag-chokin-use','JO1使用':'tag-jo1-use' };
  return map[cat] || 'tag-sonota';
}

// ===== EXPENSE LIST =====
function renderExpenseList() {
  const d = getCurrentData();
  const overrides = d.overrides || {};
  const expenses = d.expenses || [];
  const defaults = state.settings.defaults || [];
  const list = document.getElementById('expense-list');

  const effectiveDefaults = defaults.map(e => getEffectiveDefault(e, overrides)).filter(Boolean);

  if (effectiveDefaults.length === 0 && expenses.length === 0) {
    list.innerHTML = '<div class="empty-state">支出がありません</div>';
    return;
  }

  const defaultRows = effectiveDefaults.map(e => `
    <div class="expense-row" style="background:#fdf8fb;">
      <span class="row-date" style="font-size:10px;color:#ccc;min-width:28px;">毎月</span>
      <span class="row-tag ${tagClass(e.category)}">${e.category}</span>
      <span class="row-item">${e.item || ''}</span>
      <span class="row-amount">${e.amount.toLocaleString()}円</span>
      <button class="row-copy" onclick="duplicateDefault('${e.defId}')" title="複製">⊕</button>
      <button class="row-edit" onclick="openEditDefault('${e.defId}')">✎</button>
      <button class="row-del" onclick="deleteDefaultForMonth('${e.defId}')">×</button>
    </div>
  `).join('');

  const expenseRows = expenses.map((e, i) => `
    <div class="expense-row">
      <span class="row-date">${e.date}</span>
      <span class="row-tag ${tagClass(e.category)}">${e.category}</span>
      <span class="row-item">${e.item || ''}</span>
      <span class="row-amount">${e.amount.toLocaleString()}円</span>
      <button class="row-copy" onclick="duplicateExpense(${i})" title="複製">⊕</button>
      <button class="row-edit" onclick="openEditExpense(${i})">✎</button>
      <button class="row-del" onclick="deleteExpense(${i})">×</button>
    </div>
  `).join('');

  list.innerHTML = defaultRows + expenseRows;
}

// ===== ADD EXPENSE =====
function addExpense() {
  const cat = document.getElementById('entry-category').value;
  const item = document.getElementById('entry-item').value.trim();
  const amount = parseFloat((document.getElementById('entry-amount').value || '').replace(/,/g, ''));

  if (!cat) { showToast('用途を選択してください'); return; }
  if (isNaN(amount)) { showToast('金額を入力してください'); return; }

  const d = getCurrentData();
  const now = new Date();
  const date = `${state.currentMonth}/${now.getDate()}`;
  d.expenses.push({ id: Date.now(), date, category: cat, item: item || '', amount });
  saveData();

  document.getElementById('entry-category').value = '';
  document.getElementById('entry-item').value = '';
  document.getElementById('entry-amount').value = '';

  renderExpenseList();
  recalc();
  renderSavings();
  showToast('登録しました！');
}

function deleteExpense(index) {

}

// ===== DUPLICATE EXPENSE =====
function duplicateExpense(index) {
  const d = getCurrentData();

  const now = new Date();
  const date = `${state.currentMonth}/${now.getDate()}`;
  d.expenses.push({ id: Date.now(), date, category: e.category, item: e.item, amount: e.amount });

  renderExpenseList();
  recalc();

function duplicateDefault(defId) {
  const d = getCurrentData();
  const overrides = d.overrides || {};
  const base = state.settings.defaults.find(e => e.defId === defId);
  const effective = getEffectiveDefault(base, overrides);
  if (!effective) return;
  const now = new Date();
  const date = `${state.currentMonth}/${now.getDate()}`;
  d.expenses.push({ id: Date.now(), date, category: effective.category, item: effective.item, amount: effective.amount });
  saveData();
  renderExpenseList();
  recalc();
  renderSavings();
  showToast('複製しました！');
}

function saveEdit() {

  const item = document.getElementById('edit-item').value.trim();
  const amount = parseFloat((document.getElementById('edit-amount').value || '').replace(/,/g, ''));
  if (isNaN(amount)) { showToast('金額を入力してください'); return; }

  if (editTarget.type === 'expense') {
    const d = getCurrentData();

// ===== TOTAL BAR =====
function renderTotalBar() {
  const allExpenses = getAllExpenses();
  const filter = state.totalFilter;
  document.getElementById('total-filter-label').textContent = filter;
  let total = 0;
  if (filter === '全体') {
    total = allExpenses.reduce((s, e) => s + e.amount, 0);
  } else {
    total = allExpenses.filter(e => e.category === filter).reduce((s, e) => s + e.amount, 0);
  }
  document.getElementById('total-amount').textContent = total.toLocaleString();

  // 平日数・食費・駐輪場合計
  const weekdays = countWeekdays(state.currentYear, state.currentMonth);
  const dailyFoodRate = parseFloat(document.getElementById('daily-food-input').value) || 0;
  // 当月の食費カテゴリのマイナス登録分を食費合計から差し引く（プラスは無視）
  const monthEntries = (state.entries[state.currentYear] || {})[state.currentMonth] || [];
  const foodDiscount = monthEntries
    .filter(e => e.category === '食費' && e.amount < 0)
    .reduce((s, e) => s + e.amount, 0);
  const foodTotal = Math.max(0, dailyFoodRate * weekdays + foodDiscount);
  document.getElementById('food-total').textContent = foodTotal.toLocaleString();
  const parkingRate = parseFloat(document.getElementById('parking-input').value) || 0;
  document.getElementById('parking-total').textContent = (parkingRate * weekdays).toLocaleString();
}

// ===== VACATION CALENDAR PICKER =====
let vcalState = { editIndex: -1, year: 0, month: 0, rangeFrom: null, rangeTo: null, mode: 'calendar' };

function vcalOpen(index) {
  const now = new Date();
  vcalState.editIndex = index;
  if (index >= 0 && state.settings.vacations[index]) {
    const v = state.settings.vacations[index];
    const d = new Date(v.from);
    vcalState.year = d.getFullYear();
    vcalState.month = d.getMonth();
    vcalState.rangeFrom = v.from;
    vcalState.rangeTo = v.to;
  } else {
    vcalState.year = now.getFullYear();
    vcalState.month = now.getMonth();
    vcalState.rangeFrom = null;
    vcalState.rangeTo = null;
  }
  vcalRender();
  document.getElementById('vcal-overlay').classList.add('show');
}

function vcalClose() {
  document.getElementById('vcal-overlay').classList.remove('show');
}

function vcalOverlayClick(e) {
  if (e.target === document.getElementById('vcal-overlay')) vcalClose();
}

function vcalPrevMonth() {
  if (vcalState.month === 0) { vcalState.month = 11; vcalState.year--; }
  else vcalState.month--;
  vcalRender();
  vcalAnimate('right');
}

function vcalNextMonth() {
  if (vcalState.month === 11) { vcalState.month = 0; vcalState.year++; }
  else vcalState.month++;
  vcalRender();
  vcalAnimate('left');
}

function vcalAnimate(dir) {
  const grid = document.getElementById('vcal-grid');
  const cls = dir === 'right' ? 'vcal-slide-right' : 'vcal-slide-left';
  grid.classList.remove('vcal-slide-right', 'vcal-slide-left');
  void grid.offsetWidth;
  grid.classList.add(cls);
}

function vcalRender() {
  const { year, month, rangeFrom, rangeTo } = vcalState;
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('vcal-month-label').textContent = `${year}年 ${MONTHS[month]}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date().toISOString().slice(0, 10);

  const dows = ['日','月','火','水','木','金','土'];
  let html = dows.map(d => `<div class="vcal-dow">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) html += `<div class="vcal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'vcal-day';
    if (key === today) cls += ' today';
    if (rangeFrom && rangeTo) {
      if (key > rangeFrom && key < rangeTo) cls += ' in-range';
      if (key === rangeFrom) cls += ' range-start';
      if (key === rangeTo) cls += ' range-end';
    } else if (rangeFrom && key === rangeFrom) {
      cls += ' range-start range-end';
    }
    html += `<div class="${cls}" onclick="vcalDayClick('${key}')">${d}</div>`;
  }

  document.getElementById('vcal-grid').innerHTML = html;

  const hint = !rangeFrom ? '開始日をタップしてください' : !rangeTo || rangeFrom === rangeTo ? '終了日をタップしてください' : `${rangeFrom} 〜 ${rangeTo}`;
  document.getElementById('vcal-hint').textContent = hint;

  const saveBtn = document.getElementById('vcal-save-btn');
  const canSave = !!(rangeFrom);
  saveBtn.disabled = !canSave;
  saveBtn.style.opacity = canSave ? '1' : '0.4';

  // カレンダービュー表示
  document.getElementById('vcal-calendar-view').style.display = '';
  document.getElementById('vcal-picker-view').style.display = 'none';
}

// ===== ピッカー（年・月選択）=====
function vcalShowPicker(mode) {
  vcalState.mode = mode;
  document.getElementById('vcal-calendar-view').style.display = 'none';
  document.getElementById('vcal-picker-view').style.display = '';
  const el = document.getElementById('vcal-picker-content');

  if (mode === 'year') {
    const currentY = vcalState.year;
    const years = Array.from({length: 11}, (_, i) => currentY - 5 + i);
    el.innerHTML = `<div style="margin-bottom:8px;font-size:13px;font-weight:700;color:#aaa;">年を選択</div>
      <div class="vcal-picker-grid">

      </div>`;
  } else {
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    el.innerHTML = `<div style="margin-bottom:8px;font-size:13px;font-weight:700;color:#aaa;">${vcalState.year}年 月を選択</div>
      <div class="vcal-picker-grid">
        ${months.map((m,i) => `<div class="vcal-picker-item${i === vcalState.month ? ' selected' : ''}" onclick="vcalPickMonth(${i})">${m}</div>`).join('')}
      </div>`;
  }
}

function vcalPickYear(y) {
  vcalState.year = y;
  vcalShowPicker('month');
}

function vcalPickMonth(m) {
  vcalState.month = m;
  vcalRender();
}

// ===== カレンダースワイプ =====
(function() {
  let sx = 0;
  const getSheet = () => document.getElementById('vcal-sheet-inner');
  document.addEventListener('touchstart', e => {
    if (!getSheet() || !getSheet().contains(e.target)) return;
    sx = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!document.getElementById('vcal-overlay').classList.contains('show')) return;
    if (document.getElementById('vcal-picker-view').style.display !== 'none') return;
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) < 50) return;
    if (dx < 0) vcalNextMonth();
    else vcalPrevMonth();
  }, { passive: true });
})();

function vcalDayClick(key) {
  const { rangeFrom, rangeTo } = vcalState;
  if (!rangeFrom || (rangeFrom && rangeTo && rangeFrom !== rangeTo)) {
    // 最初のクリック or リセット
    vcalState.rangeFrom = key;
    vcalState.rangeTo = null;
  } else if (rangeFrom && !rangeTo) {
    // 2回目クリック
    if (key < rangeFrom) { vcalState.rangeFrom = key; vcalState.rangeTo = null; }
    else vcalState.rangeTo = key;
  } else {
    vcalState.rangeFrom = key;
    vcalState.rangeTo = null;
  }
  vcalRender();
}

function vcalSave() {
  const { editIndex, rangeFrom, rangeTo } = vcalState;
  if (!rangeFrom) return;
  const entry = { from: rangeFrom, to: rangeTo || rangeFrom };
  if (!state.settings.vacations) state.settings.vacations = [];
  if (editIndex >= 0) state.settings.vacations[editIndex] = entry;
  else state.settings.vacations.push(entry);
  saveData();
  renderVacationList();
  recalc();
  vcalClose();
}

function addDefaultEntry() {
  const cat = document.getElementById('default-category').value;
  const item = document.getElementById('default-item').value.trim();
  const amount = parseFloat((document.getElementById('default-amount').value || '').replace(/,/g, ''));

  if (!cat) { showToast('用途を選択してください'); return; }
  if (isNaN(amount)) { showToast('金額を入力してください'); return; }

  const defId = 'def_' + Date.now();
  state.settings.defaults.push({ defId, category: cat, item: item || '', amount });
  saveData();

  document.getElementById('default-category').value = '';
  document.getElementById('default-item').value = '';
  document.getElementById('default-amount').value = '';

  renderDefaultList();
  renderExpenseList();
  recalc();
  renderSavings();
  showToast('全月の支出に追加しました！');
}

function duplicateDefaultEntry(index) {
  const e = state.settings.defaults[index];
  const defId = 'def_' + Date.now();
  state.settings.defaults.push({ defId, category: e.category, item: e.item, amount: e.amount });
  saveData();
  renderDefaultList();
  renderExpenseList();
  recalc();
  renderSavings();
  showToast('複製しました！');
}

function deleteDefaultEntry(index) {
  state.settings.defaults.splice(index, 1);
  saveData();
  renderDefaultList();
  renderExpenseList();
  recalc();
  renderSavings();
}

function renderDefaultTotal() {
  const defaults = state.settings.defaults || [];
  const total = defaults.reduce((s, d) => s + (d.amount || 0), 0);
  const el = document.getElementById('default-total');
  if (el) el.textContent = total.toLocaleString();
}

function renderDefaultList() {
  const defaults = state.settings.defaults || [];
  const list = document.getElementById('default-list');
  if (defaults.length === 0) {
    list.innerHTML = '<div class="empty-state">デフォルト支出がありません</div>';
    return;
  }
  list.innerHTML = defaults.map((e, i) => `
    <div class="expense-row">
      <span class="row-tag ${tagClass(e.category)}">${e.category}</span>
      <span class="row-item">${e.item || ''}</span>
      <span class="row-amount">${e.amount.toLocaleString()}円</span>
      <button class="row-copy" onclick="duplicateDefaultEntry(${i})" title="複製">⊕</button>
      <button class="row-del" onclick="deleteDefaultEntry(${i})">×</button>
    </div>
  `).join('');
}

// ===== SAVINGS =====
function renderSavings() {
  let totalChokin = 0, totalJo1 = 0;
  let plannedChokin = 0, plannedJo1 = 0;
  const todayDate = new Date();
  const todayKey = monthKey(todayDate.getFullYear(), todayDate.getMonth() + 1);

  const defaults = state.settings.defaults || [];
  const defaultChokin = defaults.filter(e => e.category === '貯金').reduce((s, e) => s + e.amount, 0);
  const defaultJo1 = defaults.filter(e => e.category === 'JO1').reduce((s, e) => s + e.amount, 0);

  // 集計範囲：2026年3月〜2030年12月（固定）、それ以降は現在年+3年先まで
  const endY = Math.max(2030, todayDate.getFullYear() + 3);
  const todayYear = todayDate.getFullYear();
  const todayMonth = todayDate.getMonth() + 1;

  // 年別にグループ化した行データ
  const chokinYearGroups = [];
  const jo1YearGroups = [];
  let cumulativeChokin = 0, cumulativeJo1 = 0;

  for (let y = 2026; y <= endY; y++) {
    const startM = (y === 2026) ? 3 : 1;
    const lastM = 12;
    // その年が完了しているか：現在年より前の年は折りたたみ
    const yearDone = (y < todayYear);
    const yearChokinMonths = [];
    const yearJo1Months = [];
    let yearChokinTotal = 0, yearJo1Total = 0;
    let yearChokinUsed = 0, yearJo1Used = 0;
    let hasCurrentMonth = false;

    for (let m = startM; m <= lastM; m++) {
      const k = monthKey(y, m);
      const d = state.data[k];
      const overrides = d ? (d.overrides || {}) : {};

      // デフォルト分（override込み）
      let defC = 0, defJ = 0;
      defaults.forEach(e => {
        const eff = getEffectiveDefault(e, overrides);
        if (!eff) return;
        if (eff.category === '貯金') defC += eff.amount;
        if (eff.category === 'JO1') defJ += eff.amount;
      });

      // 月別個別支出分
      const indivC = d ? (d.expenses || []).filter(e => e.category === '貯金').reduce((s, e) => s + e.amount, 0) : 0;
      const indivJ = d ? (d.expenses || []).filter(e => e.category === 'JO1').reduce((s, e) => s + e.amount, 0) : 0;

      const cAmt = defC + indivC;
      const jAmt = defJ + indivJ;

      const chokinUsedM = d ? (d.expenses || []).filter(e => e.category === '貯金使用').reduce((s, e) => s + e.amount, 0) : 0;
      const jo1UsedM = d ? (d.expenses || []).filter(e => e.category === 'JO1使用').reduce((s, e) => s + e.amount, 0) : 0;

      plannedChokin += cAmt - chokinUsedM;
      plannedJo1 += jAmt - jo1UsedM;
      if (k <= todayKey) { totalChokin += cAmt - chokinUsedM; totalJo1 += jAmt - jo1UsedM; }
      cumulativeChokin += cAmt - chokinUsedM;
      cumulativeJo1 += jAmt - jo1UsedM;

      yearChokinTotal += cAmt - chokinUsedM;
      yearJo1Total += jAmt - jo1UsedM;
      yearChokinUsed += chokinUsedM;
      yearJo1Used += jo1UsedM;

      const isCurrent = (k === monthKey(state.currentYear, state.currentMonth));
      if (isCurrent) hasCurrentMonth = true;
      const isPast = k <= todayKey;

      yearChokinMonths.push({ label: `${String(m).padStart(2,'0')}月`, amount: cAmt, used: chokinUsedM, cumulative: cumulativeChokin, isCurrent, isPast });
      yearJo1Months.push({ label: `${String(m).padStart(2,'0')}月`, amount: jAmt, used: jo1UsedM, cumulative: cumulativeJo1, isCurrent, isPast });
    }

    chokinYearGroups.push({ year: y, done: yearDone, months: yearChokinMonths, yearTotal: yearChokinTotal, cumulativeAtEnd: cumulativeChokin, hasCurrentMonth });
    jo1YearGroups.push({ year: y, done: yearDone, months: yearJo1Months, yearTotal: yearJo1Total, cumulativeAtEnd: cumulativeJo1, hasCurrentMonth });
  }

  const currentTotal = totalChokin + totalJo1;
  const plannedTotal = plannedChokin + plannedJo1;
  const goal = state.settings.goal || 0;

  document.getElementById('savings-chokin-current').value = totalChokin.toLocaleString();
  document.getElementById('savings-jo1-current').value = totalJo1.toLocaleString();
  document.getElementById('savings-chokin-planned').value = plannedChokin.toLocaleString();
  document.getElementById('savings-jo1-planned').value = plannedJo1.toLocaleString();

  if (goal > 0) {
    const pct = Math.min(100, Math.round(totalChokin / goal * 100));
    document.getElementById('savings-progress-wrap').style.display = 'block';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-detail').textContent = `${totalChokin.toLocaleString()} / ${goal.toLocaleString()}円`;
  } else {
    document.getElementById('savings-progress-wrap').style.display = 'none';
  }

  const renderYearGroups = (groups) => groups.map(g => {
    if (g.done) {
      // 年が終了した場合：年行のみ表示（累計継続）
      return `
        <div class="savings-row savings-year-row">
          <span class="s-month s-year-label">${g.year}</span>
          <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="s-amount">${g.cumulativeAtEnd.toLocaleString()}円</span>
            <span style="font-size:10px;color:#aaa;">年計+${g.yearTotal.toLocaleString()}円</span>
          </span>
        </div>`;
    } else {
      // 進行中の年：年ヘッダー行＋月行を表示
      const yearHeader = `
        <div class="savings-row savings-year-header">
          <span class="s-month s-year-label">${g.year}年</span>
        </div>`;
      const monthRows = g.months.map(r => `
        <div class="savings-row ${r.isCurrent ? 'current-month' : ''}">
          <span class="s-month" style="color:${r.isPast || r.isCurrent ? '' : '#bbb'}">${r.label}</span>
          <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="s-amount" style="color:${r.isPast || r.isCurrent ? '' : '#bbb'}">${r.cumulative.toLocaleString()}円</span>
            <span style="font-size:10px;color:#aaa;">+${r.amount.toLocaleString()}円</span>
            ${r.used > 0 ? `<span style="font-size:10px;color:#d4537a;font-weight:700;">-${r.used.toLocaleString()}円</span>` : ''}
          </span>
        </div>`).join('');
      return yearHeader + monthRows;
    }
  }).join('');

  document.getElementById('savings-chokin-list').innerHTML = renderYearGroups(chokinYearGroups);
  document.getElementById('savings-jo1-list').innerHTML = renderYearGroups(jo1YearGroups);
}

// ===== SCREEN NAV =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = '';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'vacation') renderVacationList();
  document.getElementById(`screen-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'savings') renderSavings();
}

// ===== BACKUP / RESTORE =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzv0OrJJxIXSNi_Ply3O0wuzIu-I1fGBCAYRNIU9GXsQ0qtoANR4b9NuhZsi-VDhTrm/exec';

function showBackupSheet() {
  document.getElementById('backup-overlay').classList.add('show');
}
function closeBackupSheet(e) {
  if (e.target === document.getElementById('backup-overlay')) {
    document.getElementById('backup-overlay').classList.remove('show');
  }
}

// クラウドに保存
async function syncUpload() {
  try {
    showToast('保存中...');
    const json = JSON.stringify(state);
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: json
    });
    showToast('クラウドに保存しました！');
    document.getElementById('backup-overlay').classList.remove('show');
  } catch(e) {
    showToast('保存に失敗しました');
  }
}

// クラウドから読み込む
async function syncDownload() {
  showToast('読み込み中...');
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now(), { signal: controller.signal });
    clearTimeout(timer);
    const parsed = await res.json();
    if (!parsed || Object.keys(parsed).length === 0) {
      showToast('クラウドにデータがありません');
      return;
    }
    state = { ...state, ...parsed };
    // 読み込み後は今月を開く
    const now = new Date();
    state.currentYear = now.getFullYear();
    state.currentMonth = now.getMonth() + 1;
    saveData();
    showScreen('top');
    renderAll();
    document.getElementById('backup-overlay').classList.remove('show');
    showToast('読み込みました！');
  } catch(e) {
    showToast('読み込みに失敗しました');
  }
}

// ファイルに保存
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kakeibo_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを保存しました！');
}

// ファイルから復元
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      state = { ...state, ...parsed };
      saveData();
      renderAll();
      document.getElementById('backup-overlay').classList.remove('show');
      showToast('復元しました！');
    } catch(err) {
      showToast('ファイルが正しくありません');
    }
  };
  reader.readAsText(file);
}

// ===== ENTER KEY HANDLERS =====
function handleEntryEnter(e) {
  if (e.key === 'Enter') { e.preventDefault(); addExpense(); }
}
function handleDefaultEnter(e) {
  if (e.key === 'Enter') { e.preventDefault(); addDefaultEntry(); }
}

// ===== FORMAT INCOME INPUT =====
// IME変換中はフォーマット処理をスキップするためのフラグ
(function() {
  document.addEventListener('compositionstart', e => {
    if (e.target && e.target.tagName === 'INPUT') e.target._imeActive = true;
  });
  document.addEventListener('compositionend', e => {
    if (e.target && e.target.tagName === 'INPUT') {
      e.target._imeActive = false;
      // IME確定後に数字以外を除去して再フォーマット
      const id = e.target.id;
      if (id === 'income-input') { formatIncomeInput(e.target); recalc(); }
      else if (id === 'entry-amount' || id === 'default-amount') formatNumberInput(e.target);
      else if (id === 'savings-goal') { formatGoalInput(e.target); saveSettings(); renderSavings(); }
      else if (id === 'daily-food-input' || id === 'parking-input') { e.target.value = e.target.value.replace(/[^0-9]/g, ''); saveSettings(); recalc(); }
    }
  });
})();

function formatSettingInput(el) {
  if (el._imeActive) return;
  const raw = el.value.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/[^0-9]/g, '');
  el.value = raw;
}

function formatGoalInput(el) {
  if (el._imeActive) return;
  const raw = (el.value || '').replace(/,/g, '').replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  if (/^\d+$/.test(raw)) el.value = parseInt(raw, 10).toLocaleString();
}

function formatNumberInput(el) {
  if (el._imeActive) return;
  // 全角数字を半角に変換
  const raw = el.value.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/,/g, '');
  if (/^-?\d+$/.test(raw)) {
    el.value = parseInt(raw, 10).toLocaleString();
  } else {
    // 数字以外の文字を除去（変換中の文字列は残す）
    const cleaned = raw.replace(/[^0-9-]/g, '');
    if (/^-?\d+$/.test(cleaned)) el.value = parseInt(cleaned, 10).toLocaleString();
  }
}

function formatIncomeInput(el) {
  if (el._imeActive) return;
  // 全角数字を半角に変換してから数字以外を除去
  const raw = el.value.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/,/g, '').replace(/[^0-9]/g, '');
  if (raw === '') { el.value = ''; return; }
  const num = parseInt(raw, 10);
  const pos = el.selectionStart;
  const oldLen = el.value.length;
  el.value = num.toLocaleString();
  const newLen = el.value.length;
  try { el.setSelectionRange(pos + (newLen - oldLen), pos + (newLen - oldLen)); } catch(e) {}
}

// ===== SWIPE =====
(function() {
  let startX = 0, startY = 0;
  const THRESHOLD = 50;  // スワイプ判定の最小px
  const ANGLE = 30;      // 横方向と判定する角度

  document.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    // ホーム画面でのみ有効
    if (!document.getElementById('screen-top').classList.contains('active')) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < THRESHOLD) return;
    if (Math.abs(dy) > Math.abs(dx) * Math.tan(ANGLE * Math.PI / 180)) return;
    if (dx < 0) changeMonth(1);  // 左スワイプ → 次の月
    else changeMonth(-1);         // 右スワイプ → 前の月
  }, { passive: true });
})();

// ===== MONTH JUMP PICKER =====
let mjumpState = { year: 0, mode: 'year' };

function openMonthJumpPicker() {
  mjumpState.year = state.currentYear;
  mjumpState.mode = 'year';
  mjumpRender();
  document.getElementById('mjump-overlay').classList.add('show');
}

function mjumpClose() {
  document.getElementById('mjump-overlay').classList.remove('show');
}

function mjumpOverlayClick(e) {
  if (e.target === document.getElementById('mjump-overlay')) mjumpClose();
}

function mjumpRender() {
  const el = document.getElementById('mjump-picker-content');
  if (mjumpState.mode === 'year') {
    const currentY = mjumpState.year;
    const baseY = state.currentYear;
    const years = Array.from({length: 11}, (_, i) => baseY - 5 + i)
      .filter(y => y >= 2026);
    el.innerHTML = `<div style="margin-bottom:10px;font-size:13px;font-weight:700;color:#aaa;">年を選択</div>
      <div class="vcal-picker-grid">
        ${years.map(y => `<div class="vcal-picker-item${y === currentY ? ' selected' : ''}" onclick="mjumpPickYear(${y})">${y}</div>`).join('')}
      </div>`;
  } else {
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    el.innerHTML = `<span class="vcal-picker-back" onclick="mjumpBackToYear()">◀ ${mjumpState.year}年</span>
      <div style="margin-bottom:10px;font-size:13px;font-weight:700;color:#aaa;">${mjumpState.year}年の月を選択</div>
      <div class="vcal-picker-grid">
        ${months.map((m,i) => {
          const y = mjumpState.year, mo = i+1;
          const isCurrent = (y === state.currentYear && mo === state.currentMonth);
          const disabled = (y === 2026 && mo < 3);
          return `<div class="vcal-picker-item${isCurrent ? ' selected' : ''}${disabled ? ' disabled' : ''}" ${disabled ? '' : `onclick="mjumpPickMonth(${mo})"`} style="${disabled ? 'color:#ddd;cursor:default;' : ''}">${m}</div>`;
        }).join('')}
      </div>`;
  }
}

function mjumpPickYear(y) {
  mjumpState.year = y;
  mjumpState.mode = 'month';
  mjumpRender();
}

function mjumpBackToYear() {
  mjumpState.mode = 'year';
  mjumpRender();
}

function mjumpPickMonth(m) {
  const y = mjumpState.year;
  state.currentYear = y;
  state.currentMonth = m;
  saveData();
  mjumpClose();
  renderAll();
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
